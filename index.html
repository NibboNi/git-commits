<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Git Commits Composer</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="header">
      <button type="button" data-theme="light">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <title>white-balance-sunny</title>
          <path
            d="M3.55 19.09L4.96 20.5L6.76 18.71L5.34 17.29M12 6C8.69 6 6 8.69 6 12S8.69 18 12 18 18 15.31 18 12C18 8.68 15.31 6 12 6M20 13H23V11H20M17.24 18.71L19.04 20.5L20.45 19.09L18.66 17.29M20.45 5L19.04 3.6L17.24 5.39L18.66 6.81M13 1H11V4H13M6.76 5.39L4.96 3.6L3.55 5L5.34 6.81L6.76 5.39M1 13H4V11H1M13 20H11V23H13"
          />
        </svg>
      </button>
      <button type="button" data-theme="dark">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <title>weather-night</title>
          <path
            d="M17.75,4.09L15.22,6.03L16.13,9.09L13.5,7.28L10.87,9.09L11.78,6.03L9.25,4.09L12.44,4L13.5,1L14.56,4L17.75,4.09M21.25,11L19.61,12.25L20.2,14.23L18.5,13.06L16.8,14.23L17.39,12.25L15.75,11L17.81,10.95L18.5,9L19.19,10.95L21.25,11M18.97,15.95C19.8,15.87 20.69,17.05 20.16,17.8C19.84,18.25 19.5,18.67 19.08,19.07C15.17,23 8.84,23 4.94,19.07C1.03,15.17 1.03,8.83 4.94,4.93C5.34,4.53 5.76,4.17 6.21,3.85C6.96,3.32 8.14,4.21 8.06,5.04C7.79,7.9 8.75,10.87 10.95,13.06C13.14,15.26 16.1,16.22 18.97,15.95M17.33,17.97C14.5,17.81 11.7,16.64 9.53,14.5C7.36,12.31 6.2,9.5 6.04,6.68C3.23,9.82 3.34,14.64 6.35,17.66C9.37,20.67 14.19,20.78 17.33,17.97Z"
          />
        </svg>
      </button>
      <button type="button" data-theme="system">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <title>monitor</title>
          <path
            d="M21,16H3V4H21M21,2H3C1.89,2 1,2.89 1,4V16A2,2 0 0,0 3,18H10V20H8V22H16V20H14V18H21A2,2 0 0,0 23,16V4C23,2.89 22.1,2 21,2Z"
          />
        </svg>
      </button>
    </header>
    <form class="container form">
      <p class="count"><span id="count">0</span>/50</p>
      <div class="panel">
        <div class="panel__command">
          <label for="breakingChange">No retrocompatible</label>
          <input type="checkbox" id="breakingChange" name="breakingChange" />
        </div>
        <div class="panel__command">
          <label for="command">Copiar como comando</label>
          <input type="checkbox" id="command" name="command" />
        </div>
        <div class="panel__command">
          <label for="debug">Previsualizar</label>
          <input type="checkbox" id="debug" name="debug" />
        </div>
        <div class="panel__command">
          <label for="warnings">Advertencias</label>
          <input type="checkbox" id="warnings" name="warnings" checked />
        </div>
      </div>
      <select id="type" name="type">
        <option value="chore">chore</option>
        <option value="feat">feat</option>
        <option value="fix">fix</option>
        <option value="build">build</option>
        <option value="docs">docs</option>
        <option value="ops">ops</option>
        <option value="perf">perf</option>
        <option value="refactor">refactor</option>
        <option value="style">style</option>
        <option value="test">test</option>
      </select>
      <div class="scope">
        <span>(</span>
        <input type="text" id="scope" name="scope" placeholder="scope" />
        <span id="colon">) :</span>
      </div>
      <input type="text" id="text" name="text" />
      <p id="warning" class="hide">
        Advertencia: El mensaje supera los 50 caracteres recomendados.
      </p>
      <button type="button" id="copy">Copiar</button>
      <p id="debugCommit" class="hide"></p>
    </form>

    <footer class="footer">
      <p>
        Formateador para mensajes de commits basado
        <a
          href="https://gist.github.com/qoomon/5dfcdf8eec66a051ecd85625518cfd13"
          >en estas convenciones</a
        >.
      </p>
    </footer>

    <script src="js/app.js" type="module"></script>
  </body>
</html>
